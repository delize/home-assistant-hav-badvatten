name: Release Drafter

# Keeps a draft GitHub Release up to date as PRs merge to the default branch,
# categorising changes from PR labels. Publish the draft (with a vX.Y.Z tag) to
# trigger the Release workflow. See .github/release-drafter.yml for config.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
