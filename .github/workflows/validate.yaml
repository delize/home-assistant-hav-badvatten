name: Validate

on:
  push:
  pull_request:
  schedule:
    # Catch breakage from upstream HA / HACS changes once a week.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.18"
      - run: ruff check .
      - run: ruff format --check .

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand assets only matter for the HACS *default* store, and they
          # live in home-assistant/brands (a separate PR) — not in this repo.
          # Remove this once the brand PR is merged. Custom-repo installs work
          # without it. https://hacs.xyz/docs/publish/include#check-brands
          ignore: brands

  tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r tests/requirements_test.txt
      - run: python -m pytest tests/ -q

  import-check:
    name: Import against Home Assistant
    runs-on: ubuntu-latest
    # The smoke tests stub homeassistant, so they can't catch a wrong HA import
    # path. This installs real Home Assistant and imports every module.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install homeassistant
      - run: |
          PYTHONPATH="$PWD" python - <<'PY'
          import importlib
          for m in ["const", "api", "entity", "__init__",
                    "config_flow", "sensor", "binary_sensor"]:
              importlib.import_module(f"custom_components.hav_badvatten.{m}")
              print("imported", m)
          PY

  ha-tests:
    name: Config/Options flow (real HA)
    runs-on: ubuntu-latest
    # The stub smoke tests can't reach the actual config/options flow, where
    # framework changes have bitten us (e.g. OptionsFlow.config_entry). These
    # run the real flow under Home Assistant via pytest-homeassistant-custom-component.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r tests_ha/requirements_test.txt
      - run: python -m pytest tests_ha/ -o asyncio_mode=auto -q
